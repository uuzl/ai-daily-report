name: AI Daily Report

on:
  # ✅ push 自动触发（解决你必须手动 run 的问题）
  push:
    branches: ["main"]

  # ⏰ 定时任务（每天 UTC 0 点 = 北京 8 点）
  schedule:
    - cron: "0 0 * * *"

  # 🖱️ 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read       # checkout 需要
      pages: write         # 上传 Pages
      id-token: write      # deploy 必须

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔑 Setup environment
        run: |
          echo "TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" >> .env
          echo "SEARCH_KEYWORDS=${{ secrets.SEARCH_KEYWORDS || 'AI artificial intelligence news,OpenAI ChatGPT updates,Claude Anthropic release,DeepSeek AI developments,large language models LLM' }}" >> .env
          echo "MAX_ITEMS=${{ secrets.MAX_ITEMS || '15' }}" >> .env
          echo "SITE_URL=https://${{ github.repository_owner }}.github.io/ai-daily-report" >> .env
          echo "OUTPUT_DIR=public" >> .env

      - name: 🤖 Generate report
        run: |
          mkdir -p public
          npm run generate
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SEARCH_KEYWORDS: ${{ secrets.SEARCH_KEYWORDS }}
          MAX_ITEMS: ${{ secrets.MAX_ITEMS || '15' }}

      # ✅ 关键：上传 Pages 构建产物
      - name: 📦 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ✅ 关键：真正发布到 GitHub Pages
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
